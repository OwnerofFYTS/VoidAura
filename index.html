<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA - GHOST GIRL</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); color: #fff; z-index: 10; }
        #start { padding: 15px 50px; font-size: 20px; background: #990000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #stamina-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 8px; background: #333; border: 1px solid #555; }
        #fill { height: 100%; width: 100%; background: #ff0000; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color: #ff0000; letter-spacing: 3px;">VOID AURA</h1>
    <p>Loading your nightmare...</p>
    <button id="start">START GAME</button>
</div>

<div id="stamina-bar"><div id="fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.08);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding; 
    document.body.appendChild(renderer.domElement);

    // Light Setup (Bright enough to see textures)
    const ambient = new THREE.AmbientLight(0xffffff, 1.2); 
    scene.add(ambient);
    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    scene.add(pointLight);

    const player = new THREE.Group();
    player.position.set(0, 1.6, 0); 
    scene.add(player);
    player.add(camera);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => controls.lock();
    controls.addEventListener('lock', () => { document.getElementById('ui').style.display='none'; });

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    /* --- GITHUB MODEL LOADING --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    // Make sure 'ghost_girl.glb' is in the same GitHub folder
    loader.load('./ghost_girl.glb', function(gltf) {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5); 
        ghost.position.set(15, 0, 15); 
        scene.add(ghost);

        mixer = new THREE.AnimationMixer(ghost);
        if(gltf.animations.length > 0) {
            mixer.clipAction(gltf.animations[0]).play();
        }
        console.log("Ghost Loaded Successfully!");
    }, undefined, function(e) {
        console.error("GitHub could not find the model file!", e);
    });

    let keys = {};
    onkeydown = e => keys[e.code] = true;
    onkeyup = e => keys[e.code] = false;

    let stamina = 100, dead = false;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if(mixer) mixer.update(delta);

        if(controls.isLocked && !dead) {
            let speed = keys['ShiftLeft'] && stamina > 0 ? 0.3 : 0.15;
            if(speed > 0.15) stamina -= 1; else stamina += 0.2;
            stamina = Math.min(100, Math.max(0, stamina));
            document.getElementById('fill').style.width = stamina + "%";

            let dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            let side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if(keys['KeyW']) player.position.add(dir.multiplyScalar(speed));
            if(keys['KeyS']) player.position.sub(dir.multiplyScalar(speed));
            if(keys['KeyA']) player.position.add(side.multiplyScalar(speed));
            if(keys['KeyD']) player.position.sub(side.multiplyScalar(speed));

            if(ghost) {
                let dist = ghost.position.distanceTo(player.position);
                let ghostDir = new THREE.Vector3().subVectors(player.position, ghost.position).normalize();
                ghost.position.add(ghostDir.multiplyScalar(0.12));
                ghost.lookAt(player.position.x, 0, player.position.z);

                if(dist < 1.5) {
                    dead = true;
                    alert("GHOST GIRL CAUGHT YOU!");
                    location.reload();
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
