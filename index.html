<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror AI - Anti Glitch</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 20px 50px; font-size: 24px; background: #900; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; z-index: 10; display: none; }
        #stamina-bar { width: 200px; height: 10px; background: #333; border: 1px solid white; margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #0f0; }
    </style>
</head>
<body>

    <div id="ui">
        GHOST DISTANCE: <span id="dist">--</span>m
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
    </div>

    <div id="menu">
        <h1 style="color: red;">GHOST PURSUIT</h1>
        <button id="playBtn">PLAY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, ghost, flashlight;
        let moveF = false, moveB = false, moveL = false, moveR = false;
        let isSprint = false, isCrouch = false, canJump = true;
        let stamina = 100, velocityY = 0, gameActive = false;
        let clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // --- FIXED FLASHLIGHT (15m Range) ---
            flashlight = new THREE.SpotLight(0xffffff, 10, 15, Math.PI / 4, 0.5);
            flashlight.position.set(0, 0, 0);
            camera.add(flashlight);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            // Ghost
            ghost = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.8), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
            ghost.position.set(20, 1, -20);
            scene.add(ghost);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('playBtn').addEventListener('click', () => {
                controls.lock();
                document.getElementById('menu').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                gameActive = true;
            });

            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveF = true;
                if(e.code === 'KeyS') moveB = true;
                if(e.code === 'KeyA') moveL = true;
                if(e.code === 'KeyD') moveR = true;
                if(e.shiftKey) isSprint = true;
                if(e.code === 'KeyC') { isCrouch = true; }
                if(e.code === 'Space' && canJump) { velocityY = 0.15; canJump = false; }
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveF = false;
                if(e.code === 'KeyS') moveB = false;
                if(e.code === 'KeyA') moveL = false;
                if(e.code === 'KeyD') moveR = false;
                if(!e.shiftKey) isSprint = false;
                if(e.code === 'KeyC') isCrouch = false;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (gameActive) {
                // Ghost Movement (Always Active)
                let ghostDir = new THREE.Vector3().subVectors(camera.position, ghost.position).normalize();
                let ghostSpeed = 0.0707; // 1% faster than 0.07
                ghost.position.x += ghostDir.x * ghostSpeed;
                ghost.position.z += ghostDir.z * ghostSpeed;
                ghost.lookAt(camera.position.x, 1, camera.position.z);

                let d = camera.position.distanceTo(ghost.position);
                document.getElementById('dist').innerText = d.toFixed(1);
                if(d < 1.2) { alert("CAUGHT!"); location.reload(); }

                if (controls.isLocked) {
                    // Speed & Stamina
                    let speed = isCrouch ? 0.03 : 0.07;
                    if(isSprint && stamina > 0 && moveF) { speed = 0.15; stamina -= 0.8; }
                    else if(stamina < 100) { stamina += 0.3; }
                    document.getElementById('stamina-fill').style.width = stamina + '%';

                    // Anti-Glitch Movement
                    if (moveF) controls.moveForward(speed);
                    if (moveB) controls.moveForward(-speed);
                    if (moveL) controls.moveRight(-speed);
                    if (moveR) controls.moveRight(speed);

                    // Physics (Jump/Crouch)
                    let headH = isCrouch ? 0.8 : 1.6;
                    camera.position.y += velocityY;
                    if(camera.position.y > headH) { velocityY -= 0.008; }
                    else { camera.position.y = headH; velocityY = 0; canJump = true; }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
