```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID AURA FIXED AI</title>

<style>
body,html{margin:0;padding:0;overflow:hidden;background:#000;font-family:sans-serif;}

/* UI */
#ui{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:#000;color:#fff;z-index:10;
}

#start{
padding:18px 60px;
font-size:20px;
background:#4CAF50;
border:none;
border-radius:10px;
cursor:pointer;
}

/* CROSSHAIR */
#crosshair{
position:absolute;top:50%;left:50%;
width:14px;height:14px;
transform:translate(-50%,-50%);
z-index:5;
pointer-events:none;
}
#crosshair::before,#crosshair::after{
content:'';position:absolute;background:#fff;
}
#crosshair::before{width:100%;height:2px;top:50%;}
#crosshair::after{height:100%;width:2px;left:50%;}

/* STAMINA */
#stamina{
position:fixed;bottom:40px;left:50%;
transform:translateX(-50%);
width:200px;height:8px;
background:#111;border:1px solid #444;
}
#fill{height:100%;width:100%;background:#4CAF50;}
</style>
</head>

<body>

<div id="ui">
<h1 style="color:#4CAF50;">VOID AURA</h1>
<button id="start">PLAY</button>
</div>

<div id="crosshair"></div>
<div id="stamina"><div id="fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x111111);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
scene.add(light);

/* PLAYER */
const player=new THREE.Group();
player.position.set(40,1.7,40);
scene.add(player);
player.add(camera);

/* CONTROLS */
const controls=new THREE.PointerLockControls(camera,document.body);

document.getElementById('start').onclick=()=>{
controls.lock();
};

controls.addEventListener('lock',()=>{
document.getElementById('ui').style.display='none';
});

/* GROUND */
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

/* POTATO (ENEMY) */
const potato=new THREE.Mesh(
new THREE.SphereGeometry(1.5,32,32),
new THREE.MeshStandardMaterial({color:0x8B4513})
);
potato.position.set(10,2.2,10);
scene.add(potato);

/* INPUT */
let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

/* VALUES */
let stamina=100;
let velocityY=0;
let canJump=true;
let crouch=false;
let dead=false;

/* LOOP */
function animate(){
requestAnimationFrame(animate);

if(controls.isLocked && !dead){

/* CROUCH */
crouch = keys['KeyC'];
let targetHeight = crouch ? 1.0 : 1.7;
player.position.y += (targetHeight - player.position.y)*0.15;

/* SPEED */
let sprint = keys['ShiftLeft'] && stamina>0;
let speed = sprint ? 0.3 : 0.15;

/* STAMINA */
if(sprint && (keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])){
stamina -= 0.8;
}else{
stamina += 0.4;
}
stamina=Math.max(0,Math.min(100,stamina));
document.getElementById('fill').style.width=stamina+"%";

/* MOVE */
let oldX=player.position.x;
let oldZ=player.position.z;

if(keys['KeyW']) controls.moveForward(speed);
if(keys['KeyS']) controls.moveForward(-speed);
if(keys['KeyA']) controls.moveRight(-speed);
if(keys['KeyD']) controls.moveRight(speed);

/* JUMP */
if(keys['Space'] && canJump){
velocityY=0.22;
canJump=false;
}

player.position.y += velocityY;
velocityY -= 0.01;

if(player.position.y <= targetHeight){
player.position.y = targetHeight;
velocityY = 0;
canJump = true;
}

/* BORDER */
if(player.position.x<2||player.position.x>98) player.position.x=oldX;
if(player.position.z<2||player.position.z>98) player.position.z=oldZ;

/* 🔥 FIXED FOLLOW AI (REAL PLAYER TRACKING) */
let playerPos = new THREE.Vector3();
controls.getObject().getWorldPosition(playerPos);

let dir = new THREE.Vector3().subVectors(playerPos,potato.position);
dir.y = 0;
dir.normalize();

/* dynamic chase */
let dist = potato.position.distanceTo(playerPos);
let chaseSpeed = dist > 8 ? 0.25 : 0.18;

potato.position.add(dir.multiplyScalar(chaseSpeed));

potato.lookAt(playerPos.x,playerPos.y,playerPos.z);

/* COLLISION */
if(dist < 1.4){
dead=true;
controls.unlock();
document.getElementById('ui').style.display='flex';
document.getElementById('ui').innerHTML="<h1 style='color:red'>MASHED!</h1><button onclick='location.reload()'>RETRY</button>";
}

}

renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
