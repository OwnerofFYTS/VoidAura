<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubex.io | Professional Gaming</title>
    <style>
        /* Modern Dark Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; 
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 50px;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .login-link {
            color: #8b949e;
        }

        .login-link:hover {
            color: #ffffff;
        }

        .signup-btn {
            background-color: #ffffff;
            color: #0d1117;
            border: 1px solid #ffffff;
        }

        .signup-btn:hover {
            background-color: #e6e6e6;
        }

        /* Hero Section */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px; /* Text aur Button ko darmiyan se thora neechay karne ke liye */
        }

        h1 {
            font-size: 85px;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(180deg, #ffffff 0%, #444d56 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
        }

        .sub-text {
            color: #8b949e;
            font-size: 18px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Professional Button */
        .get-started {
            margin-top: 50px; /* Is se button aur neechay chala jayega */
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: #238636;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(35, 134, 54, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .get-started:hover {
            background: #2ea043;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(35, 134, 54, 0.4);
        }

        /* Click Animation */
        .get-started:active {
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-btn login-link">Log in</a>
        <a href="#" class="nav-btn signup-btn">Sign up</a>
    </nav>

    <div class="hero">
        <h1>Cubex.io</h1>
        <p class="sub-text">The future of minimal gaming.</p>
        <button class="get-started" onclick="startAction()">Get Started</button>
    </div>

    <script>
        function startAction() {
            alert("Redirecting to the game...");
            // Yahan hum baad mein game ka page load karenge
        }
    </script>

</body>
</html>
