<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror AI - Continuous Pursuit</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 20px 50px; font-size: 24px; background: #900; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; color: white; z-index: 10; display: none; }
        #stamina-bar { width: 200px; height: 10px; background: #333; margin-top: 5px; border: 1px solid white; }
        #stamina-fill { width: 100%; height: 100%; background: lime; }
    </style>
</head>
<body>

    <div id="ui">
        DISTANCE: <span id="dist">--</span>m
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
        <small>[SHIFT] Sprint | [SPACE] Jump | [C] Crouch</small>
    </div>

    <div id="menu">
        <h1 style="color: red; font-size: 40px;">ALWAYS WATCHING</h1>
        <button id="playBtn">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, ghost, flashlight;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false, isCrouching = false, canJump = true;
        let stamina = 100;
        let velocityY = 0;
        let gameStarted = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x080808 }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // --- IMPROVED FLASHLIGHT (Bari Focus Wali) ---
            flashlight = new THREE.SpotLight(0xffffff, 8, 8, Math.PI / 3.5, 0.3); // Angle wide kar diya (PI/3.5)
            flashlight.position.set(0, 0, 0);
            camera.add(flashlight);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            // Ghost AI (White Wireframe)
            const ghostGeo = new THREE.BoxGeometry(0.7, 2.2, 0.7);
            const ghostMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
            ghost = new THREE.Mesh(ghostGeo, ghostMat);
            ghost.position.set(20, 1.1, -20);
            scene.add(ghost);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('playBtn').addEventListener('click', () => {
                controls.lock();
                document.getElementById('menu').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                gameStarted = true;
            });

            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
                if(e.code === 'ShiftLeft') isSprinting = true;
                if(e.code === 'Space' && canJump && !isCrouching) { velocityY = 0.15; canJump = false; }
                if(e.code === 'KeyC') isCrouching = true;
            });

            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
                if(e.code === 'ShiftLeft') isSprinting = false;
                if(e.code === 'KeyC') isCrouching = false;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gameStarted) {
                // --- CONTINUOUS GHOST MOVEMENT (Rukega Nahi) ---
                const dir = new THREE.Vector3();
                dir.subVectors(camera.position, ghost.position).normalize();
                
                // Ghost Speed (0.07 * 1.01 = 0.0707)
                const ghostSpeed = 0.0707; 
                ghost.position.x += dir.x * ghostSpeed;
                ghost.position.z += dir.z * ghostSpeed;
                ghost.lookAt(camera.position.x, 1.1, camera.position.z);

                let d = camera.position.distanceTo(ghost.position);
                document.getElementById('dist').innerText = d.toFixed(1);

                if (d < 1.3) {
                    alert("THE GHOST CAUGHT YOU!");
                    location.reload();
                }

                if (controls.isLocked) {
                    let walkSpeed = 0.07;
                    let speed = isCrouching ? 0.03 : walkSpeed;

                    if (isSprinting && stamina > 0 && (moveForward || moveBackward || moveLeft || moveRight)) {
                        speed = 0.15;
                        stamina -= 0.8;
                    } else if (stamina < 100) {
                        stamina += 0.25;
                    }
                    document.getElementById('stamina-fill').style.width = stamina + '%';

                    if (moveForward) controls.moveForward(speed);
                    if (moveBackward) controls.moveForward(-speed);
                    if (moveLeft) controls.moveRight(-speed);
                    if (moveRight) controls.moveRight(speed);

                    let targetHeight = isCrouching ? 0.8 : 1.6;
                    camera.position.y += velocityY;
                    if (camera.position.y > targetHeight) {
                        velocityY -= 0.008;
                    } else {
                        camera.position.y = targetHeight;
                        velocityY = 0;
                        canJump = true;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
