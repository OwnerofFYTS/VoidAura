<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Beyond the Horizon</title>
    <style>
        body { margin: 0; padding: 0; background: #020c1b; color: #e6f1ff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* AUTH & HERO (Bahar se nahi chhera) */
        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; z-index: 10; position: relative; }
        .login-btn { color: #8892b0; background: none; border: none; cursor: pointer; }
        .signup-btn { color: #64ffda; border: 1px solid #64ffda; padding: 10px 22px; border-radius: 4px; cursor: pointer; background: none; }
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .get-started { margin-top: 50px; padding: 20px 65px; background: #64ffda; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* GAME UI */
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid #64ffda; transform: translate(-50%, -50%); pointer-events: none; }

        /* HOTBAR (9 Slots) */
        #hotbar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.5); padding: 4px; border: 2px solid #333; z-index: 1010; }
        .slot { width: 40px; height: 40px; background: #8b8b8b; border: 2px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot.selected { border-color: #fff; box-shadow: inset 0 0 10px #fff; }
        
        /* INVENTORY (30 + 9 Slots) */
        #inventory-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #c6c6c6; border: 4px solid #333; padding: 20px; z-index: 2000; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 40px); gap: 4px; margin-bottom: 20px; }
        .inv-title { color: #333; font-weight: bold; margin-bottom: 10px; }

        /* PIXEL ART TEXTURES (Pure CSS) */
        .sword-icon { width: 25px; height: 25px; background: #64ffda; clip-path: polygon(0% 100%, 100% 0%, 80% 0%, 0% 80%); }
        .block-icon { width: 20px; height: 20px; background: #8892b0; border: 2px solid #233554; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(2,12,27,0.9); }
        .modal-content { background: #112240; width: 300px; margin: 100px auto; padding: 40px; border-radius: 10px; text-align: center; }
        input { width: 100%; margin: 10px 0; padding: 10px; background: #0a192f; border: 1px solid #233554; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <button class="login-btn" onclick="openAuth()">Login</button>
        <button class="signup-btn" onclick="openAuth()">Sign Up</button>
    </nav>

    <div class="hero" id="home-hero">
        <h1>VoidCraft</h1>
        <p style="letter-spacing: 4px; color: #8892b0;">BEYOND THE HORIZON</p>
        <button class="get-started" onclick="initGameFlow()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:#64ffda">Sign Up</h2>
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="get-started" style="width:100%" onclick="launchGame()">Continue</button>
        </div>
    </div>

    <div id="game-view">
        <div id="crosshair"></div>
        
        <div id="hotbar">
            <div class="slot selected" id="s1"><div class="sword-icon"></div></div>
            <div class="slot" id="s2"><div class="block-icon"></div></div>
            <div class="slot" id="s3"></div><div class="slot" id="s4"></div>
            <div class="slot" id="s5"></div><div class="slot" id="s6"></div>
            <div class="slot" id="s7"></div><div class="slot" id="s8"></div>
            <div class="slot" id="s9"></div>
        </div>

        <div id="inventory-screen">
            <div class="inv-title">Inventory</div>
            <div class="inv-grid">
                <script>
                    for(let i=0; i<27; i++) document.write('<div class="slot"></div>');
                </script>
            </div>
            <div class="inv-title">Hotbar</div>
            <div class="inv-grid" id="inv-hotbar-mirror">
                <script>
                    for(let i=0; i<9; i++) document.write('<div class="slot"></div>');
                </script>
            </div>
        </div>
        <canvas id="void-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let loggedIn = false;
        let invOpen = false;
        const canvas = document.getElementById('void-canvas');

        function openAuth() { document.getElementById('authModal').style.display='block'; }
        function initGameFlow() { if(!loggedIn) openAuth(); else launchGame(); }

        function launchGame() {
            loggedIn = true;
            document.getElementById('authModal').style.display='none';
            document.getElementById('top-nav').style.display='none';
            document.getElementById('home-hero').style.display='none';
            document.getElementById('game-view').style.display='block';
            startVoidEngine();
        }

        function startVoidEngine() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020c1b);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // World: Lava & Towers
            const lava = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0xff4400}));
            lava.rotation.x = -Math.PI/2; lava.position.y = -30;
            scene.add(lava);

            for(let i=0; i<8; i++) {
                const tower = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 10), new THREE.MeshStandardMaterial({color: 0x444d56}));
                const angle = (i/8)*Math.PI*2;
                tower.position.set(Math.cos(angle)*30, 0, Math.sin(angle)*30);
                scene.add(tower);
            }
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            camera.position.set(30, 3, 30);
            let velocityY = 0, onGround = true;
            let pitch = 0, yaw = 0;
            const keys = {};

            // KEY HANDLERS
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if(e.code === 'KeyE') {
                    invOpen = !invOpen;
                    document.getElementById('inventory-screen').style.display = invOpen ? 'block' : 'none';
                    if(invOpen) document.exitPointerLock(); else canvas.requestPointerLock();
                }
                // Hotbar selection 1-9
                if(e.key >= 1 && e.key <= 9) {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                    document.getElementById('s' + e.key).classList.add('selected');
                }
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            canvas.addEventListener('click', () => { if(!invOpen) canvas.requestPointerLock(); });
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === canvas) {
                    yaw -= e.movementX * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
                }
            });

            function animate() {
                requestAnimationFrame(animate);
                if (document.pointerLockElement === canvas && !invOpen) {
                    let speed = keys['ControlLeft'] ? 0.25 : (keys['ShiftLeft'] ? 0.06 : 0.15);
                    if(keys['KeyW']) { camera.position.x -= Math.sin(yaw)*speed; camera.position.z -= Math.cos(yaw)*speed; }
                    if(keys['KeyS']) { camera.position.x += Math.sin(yaw)*speed; camera.position.z += Math.cos(yaw)*speed; }
                    if(keys['KeyA']) { camera.position.x -= Math.sin(yaw+1.57)*speed; camera.position.z -= Math.cos(yaw+1.57)*speed; }
                    if(keys['KeyD']) { camera.position.x += Math.sin(yaw+1.57)*speed; camera.position.z += Math.cos(yaw+1.57)*speed; }
                    if(keys['Space'] && onGround) { velocityY = 0.18; onGround = false; }
                }

                // Physics & Jump/Crouch
                velocityY -= 0.008;
                camera.position.y += velocityY;
                
                // Floor height logic: Crouch changes camera ONLY
                let floorLevel = 3; 
                let viewHeight = keys['ShiftLeft'] ? 2.2 : 3;
                
                if (camera.position.y <= viewHeight) {
                    camera.position.y = viewHeight;
                    velocityY = 0;
                    onGround = true;
                }

                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                if(camera.position.y < -28) camera.position.set(30, 3, 30);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
