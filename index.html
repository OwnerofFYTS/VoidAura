<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | FULL FIX</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        #game-container { position: relative; width: 100%; height: 100vh; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; text-align: center;
        }

        .hotbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 9999;
        }
        .slot {
            width: 60px; height: 60px; background: rgba(20,20,20,0.9);
            border: 2px solid #444; display: flex; justify-content: center; align-items: center;
        }
        .slot.active { border-color: #ffaa00; box-shadow: 0 0 15px #ffaa00; }

        #stamina-bar {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 10px; background: #111; border: 1px solid #ffaa00; overflow: hidden;
        }
        #stamina-fill { width: 100%; height: 100%; background: #ffaa00; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #200; display: none; z-index: 20000;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <h1 style="color: #ffaa00; font-size: 3rem;">VOID AURA</h1>
        <p>SPACE: Jump | SHIFT: Run | CTRL: Crouch | 1: Flashlight</p>
        <button id="start-btn" style="padding: 10px 30px; cursor: pointer; background: #ffaa00; border: none; font-weight: bold;">START</button>
    </div>

    <div class="hotbar">
        <div class="slot" id="slot-1">🔦</div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>

    <div id="stamina-bar"><div id="stamina-fill"></div></div>
    
    <div id="game-over">
        <h1>MASHED!</h1>
        <button onclick="location.reload()" style="padding: 10px 20px;">TRY AGAIN</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 1, 40);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // --- ACTUAL FLASHLIGHT (ON SCREEN EFFECT) ---
    const torch = new THREE.SpotLight(0xffffff, 0, 60, Math.PI/6, 0.3, 1);
    camera.add(torch);
    torch.target.position.set(0, 0, -1);
    camera.add(torch.target);

    scene.add(new THREE.AmbientLight(0xffffff, 0.01));
    scene.add(new THREE.GridHelper(500, 100, 0x111111, 0x050505));

    // --- POTATO (NOW GLOWING SO YOU CAN SEE IT) ---
    const potatoGeo = new THREE.SphereGeometry(1.5, 32, 32);
    potatoGeo.scale(1.2, 1.6, 1.1);
    const potatoMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, emissive: 0x442200 });
    const stalker = new THREE.Mesh(potatoGeo, potatoMat);
    stalker.position.set(0, 1.6, 20);
    scene.add(stalker);

    // Light inside potato so it's visible in dark
    const potatoLight = new THREE.PointLight(0xff5500, 1, 10);
    stalker.add(potatoLight);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start-btn').onclick = () => controls.lock();
    controls.addEventListener('lock', () => document.getElementById('ui-overlay').style.display = 'none');

    let keys = {};
    let stamina = 100;
    let isFlashlightOn = false;
    let velocityY = 0;
    let canJump = false;

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key === '1') {
            isFlashlightOn = !isFlashlightOn;
            torch.intensity = isFlashlightOn ? 10 : 0;
            document.getElementById('slot-1').classList.toggle('active', isFlashlightOn);
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if (controls.isLocked) {
            const delta = 0.016; // Approx 60fps

            // Crouching (CTRL)
            let targetHeight = keys['ControlLeft'] ? 0.8 : 1.7;
            player.position.y += (targetHeight - player.position.y) * 0.1;

            // Sprinting (SHIFT)
            let isRunning = keys['ShiftLeft'] && stamina > 0;
            let speed = isRunning ? 0.25 : 0.12;

            if (isRunning) stamina -= 0.5;
            else if (stamina < 100) stamina += 0.2;
            document.getElementById('stamina-fill').style.width = stamina + "%";

            // Movement
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            // Jumping (SPACE)
            if (keys['Space'] && canJump) {
                velocityY = 0.15;
                canJump = false;
            }
            player.position.y += velocityY;
            if (player.position.y > targetHeight) {
                velocityY -= 0.008; // Gravity
            } else {
                player.position.y = targetHeight;
                velocityY = 0;
                canJump = true;
            }

            // Potato Movement
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; dir.normalize();
            stalker.position.add(dir.multiplyScalar(0.06));
            stalker.lookAt(player.position.x, 1.6, player.position.z);

            // Kill Check
            if (player.position.distanceTo(stalker.position) < 2.2) {
                document.getElementById('game-over').style.display = 'flex';
                controls.unlock();
            }
        }
        renderer.render(scene, camera);
    }
    gameLoop();
</script>
</body>
</html>
