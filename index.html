<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Pro Edition</title>
    <style>
        body { margin: 0; padding: 0; background: #020c1b; color: #e6f1ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI OVERLAY */
        #game-view { display: none; position: fixed; inset: 0; z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.5); transform: translate(-50%, -50%); pointer-events: none; }

        /* ITEM NAME ABOVE HOTBAR */
        #hotbar-label { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 18px; text-shadow: 2px 2px #000; opacity: 0; transition: opacity 0.5s; pointer-events: none; font-weight: bold; }

        /* HAND SYSTEM */
        #hand-container { position: fixed; bottom: -20px; right: 10%; width: 250px; height: 250px; pointer-events: none; z-index: 1005; }
        .held-item { width: 120px; height: 120px; transition: transform 0.1s; transform-origin: bottom; }
        .sword-hand { background: #64ffda; clip-path: polygon(45% 0%, 55% 0%, 55% 70%, 100% 70%, 100% 80%, 55% 80%, 55% 100%, 45% 100%, 45% 80%, 0% 80%, 0% 70%, 45% 70%); transform: rotate(20deg) translateX(50px); box-shadow: inset -10px -10px rgba(0,0,0,0.2); }
        .block-hand { background: #8892b0; border: 5px solid #233554; width: 90px; height: 90px; transform: rotate(5deg) translateX(40px); }

        /* INVENTORY & HOTBAR */
        #hotbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 6px; border: 3px solid #1a1a1a; z-index: 1010; }
        .slot { width: 48px; height: 48px; background: #8b8b8b; border: 3px solid #373737; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset -3px -3px #555; }
        .slot.selected { border: 3px solid #ffffff; background: #a0a0a0; box-shadow: none; }
        
        #inventory-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #c6c6c6; border: 4px solid #333; padding: 25px; z-index: 2000; box-shadow: 0 0 100px #000; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 48px); gap: 4px; }

        /* ITEM PIXELS */
        .i-sword { width: 24px; height: 24px; background: #64ffda; clip-path: polygon(0% 100%, 100% 0%, 70% 0%, 0% 70%); pointer-events: none; }
        .i-block { width: 22px; height: 22px; background: #8892b0; border: 2px solid #233554; pointer-events: none; }

        /* DRAGGING ICON */
        #cursor-item { position: fixed; pointer-events: none; z-index: 3000; display: none; }

        .btn-start { margin-top: 50px; padding: 20px 60px; background: #64ffda; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="hero" id="home-hero">
        <h1 style="font-size: 80px; margin:0; color:#ccd6f6">VoidCraft</h1>
        <button class="btn-start" onclick="launchGame()">START GAME</button>
    </div>

    <div id="game-view">
        <div id="crosshair"></div>
        <div id="hotbar-label">Diamond Sword</div>
        
        <div id="hand-container">
            <div id="held-item-visual" class="held-item"></div>
        </div>

        <div id="cursor-item"></div>

        <div id="hotbar">
            <script>for(let i=1; i<=9; i++) document.write(`<div class="slot ${i===1?'selected':''}" id="slot-${i}" onclick="handleSlotClick(this)"></div>`);</script>
        </div>

        <div id="inventory-screen">
            <p style="color:#333; font-weight:bold; margin-top:0;">Inventory</p>
            <div class="inv-grid">
                <script>for(let i=10; i<=36; i++) document.write(`<div class="slot" id="slot-${i}" onclick="handleSlotClick(this)"></div>`);</script>
            </div>
            <p style="color:#333; font-weight:bold;">Hotbar</p>
            <div class="inv-grid" id="inv-hotbar-mirror"></div>
        </div>
        <canvas id="void-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let invOpen = false, currentSlot = 1;
        let grabbedItem = null;
        const itemsData = {
            'sword': { name: "Diamond Sword", class: "sword-hand", icon: "i-sword" },
            'block': { name: "Void Block", class: "block-hand", icon: "i-block" }
        };

        function showLabel(text) {
            const label = document.getElementById('hotbar-label');
            label.innerText = text;
            label.style.opacity = 1;
            clearTimeout(window.labelTimer);
            window.labelTimer = setTimeout(() => label.style.opacity = 0, 2000);
        }

        function handleSlotClick(el) {
            if (!invOpen) return;
            const cursor = document.getElementById('cursor-item');
            
            if (!grabbedItem) {
                if (el.innerHTML !== "") {
                    grabbedItem = { html: el.innerHTML, type: el.dataset.type, name: el.dataset.name };
                    el.innerHTML = "";
                    el.dataset.type = "";
                    cursor.innerHTML = grabbedItem.html;
                    cursor.style.display = "block";
                }
            } else {
                const tempHTML = el.innerHTML;
                const tempType = el.dataset.type;
                const tempName = el.dataset.name;
                
                el.innerHTML = grabbedItem.html;
                el.dataset.type = grabbedItem.type;
                el.dataset.name = grabbedItem.name;

                if (tempHTML !== "") {
                    grabbedItem = { html: tempHTML, type: tempType, name: tempName };
                    cursor.innerHTML = grabbedItem.html;
                } else {
                    grabbedItem = null;
                    cursor.style.display = "none";
                }
            }
            updateHandVisual();
        }

        function updateHandVisual() {
            const slot = document.getElementById(`slot-${currentSlot}`);
            const visual = document.getElementById('held-item-visual');
            visual.className = 'held-item';
            if (slot.dataset.type === 'sword') visual.classList.add('sword-hand');
            if (slot.dataset.type === 'block') visual.classList.add('block-hand');
        }

        function launchGame() {
            document.getElementById('home-hero').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            
            // Initial items
            const s1 = document.getElementById('slot-1');
            s1.innerHTML = `<div class="i-sword"></div>`;
            s1.dataset.type = "sword"; s1.dataset.name = "Diamond Sword";
            
            const s2 = document.getElementById('slot-2');
            s2.innerHTML = `<div class="i-block"></div>`;
            s2.dataset.type = "block"; s2.dataset.name = "Void Block";

            startVoidEngine();
            setInterval(luckyDrop, 5000);
        }

        function luckyDrop() {
            const r = Math.random() > 0.5 ? 'sword' : 'block';
            for(let i=1; i<=9; i++) {
                const s = document.getElementById(`slot-${i}`);
                if(s.innerHTML === "") {
                    s.innerHTML = `<div class="i-${r}"></div>`;
                    s.dataset.type = r;
                    s.dataset.name = itemsData[r].name;
                    if(i === currentSlot) {
                        showLabel(itemsData[r].name);
                        updateHandVisual();
                    }
                    break;
                }
            }
        }

        function startVoidEngine() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020c1b);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('void-canvas'), antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Better Lava Texture
            const lavaGeo = new THREE.PlaneGeometry(1000, 1000);
            const lavaMat = new THREE.MeshBasicMaterial({color: 0xff3300, side: THREE.DoubleSide});
            const lava = new THREE.Mesh(lavaGeo, lavaMat);
            lava.rotation.x = Math.PI/2; lava.position.y = -30;
            scene.add(lava);

            // Towers
            for(let i=0; i<8; i++) {
                const tower = new THREE.Mesh(new THREE.BoxGeometry(15, 2, 15), new THREE.MeshStandardMaterial({color: 0x333333}));
                tower.position.set(Math.cos(i/8*Math.PI*2)*40, 0, Math.sin(i/8*Math.PI*2)*40);
                scene.add(tower);
            }
            scene.add(new THREE.PointLight(0xffffff, 1, 100));
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            camera.position.set(40, 4, 40);
            let velY = 0, onG = true, pitch = 0, yaw = 0;
            const keys = {};

            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
                }
                if (invOpen) {
                    const cursor = document.getElementById('cursor-item');
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                }
            });

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyE') {
                    invOpen = !invOpen;
                    document.getElementById('inventory-screen').style.display = invOpen ? 'block' : 'none';
                    if (invOpen) document.exitPointerLock(); else document.getElementById('void-canvas').requestPointerLock();
                }
                if (e.key >= 1 && e.key <= 9) {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                    currentSlot = parseInt(e.key);
                    const s = document.getElementById(`slot-${currentSlot}`);
                    s.classList.add('selected');
                    updateHandVisual();
                    if(s.dataset.name) showLabel(s.dataset.name);
                }
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            function animate() {
                requestAnimationFrame(animate);
                if (document.pointerLockElement && !invOpen) {
                    let s = keys['ControlLeft'] ? 0.3 : (keys['ShiftLeft'] ? 0.08 : 0.18);
                    if(keys['KeyW']) { camera.position.x -= Math.sin(yaw)*s; camera.position.z -= Math.cos(yaw)*s; }
                    if(keys['KeyS']) { camera.position.x += Math.sin(yaw)*s; camera.position.z += Math.cos(yaw)*s; }
                    if(keys['KeyA']) { camera.position.x -= Math.sin(yaw+1.57)*s; camera.position.z -= Math.cos(yaw+1.57)*s; }
                    if(keys['KeyD']) { camera.position.x += Math.sin(yaw+1.57)*s; camera.position.z += Math.cos(yaw+1.57)*s; }
                    if(keys['Space'] && onG) { velY = 0.22; onG = false; }
                }
                velY -= 0.01; camera.position.y += velY;
                let h = keys['ShiftLeft'] ? 2.5 : 4;
                if(camera.position.y <= h) { camera.position.y = h; velY = 0; onG = true; }
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                renderer.render(scene, camera);
            }
            animate();
            document.getElementById('void-canvas').onclick = () => { if(!invOpen) document.getElementById('void-canvas').requestPointerLock(); };
        }
    </script>
</body>
</html>
