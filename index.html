<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA - FIXED MOVEMENT</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); color: #fff; z-index: 20; text-align: center; }
        #start { padding: 20px 60px; font-size: 24px; background: #bc0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #ff0000; transition: 0.3s; }
        #start:hover { background: #ff0000; transform: scale(1.1); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 10; opacity: 0.5; }
        #instructions { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color: #ff0000; letter-spacing: 8px; margin-bottom: 10px;">VOID AURA</h1>
    <button id="start">CLICK TO START</button>
    <div id="instructions">WASD to Move | SHIFT to Sprint | MOUSE to Look Around</div>
</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    scene.fog = new THREE.FogExp2(0x020202, 0.08);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Light
    const ambient = new THREE.AmbientLight(0xffffff, 1.5); 
    scene.add(ambient);

    // Player Object
    const player = new THREE.Group();
    player.position.set(0, 1.7, 0); 
    scene.add(player);
    player.add(camera);

    // --- CONTROLS ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    const startBtn = document.getElementById('start');
    const ui = document.getElementById('ui');

    startBtn.onclick = () => controls.lock();

    controls.addEventListener('lock', () => ui.style.display = 'none');
    controls.addEventListener('unlock', () => ui.style.display = 'flex');

    // --- GROUND ---
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000), 
        new THREE.MeshStandardMaterial({ color: 0x0a0a0a })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    /* --- GHOST GIRL MODEL --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        ghost.position.set(20, 0, 20);
        scene.add(ghost);

        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
        console.log("Model Loaded!");
    }, undefined, (e) => console.error("Model Error:", e));

    // --- MOVEMENT LOGIC ---
    let keys = {};
    document.addEventListener('keydown', (e) => keys[e.code] = true);
    document.addEventListener('keyup', (e) => keys[e.code] = false);

    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            // Movement Speed
            const speed = keys['ShiftLeft'] ? 0.4 : 0.18;

            // Direction Vectors
            direction.z = Number(keys['KeyW']) - Number(keys['KeyS']);
            direction.x = Number(keys['KeyD']) - Number(keys['KeyA']);
            direction.normalize();

            // Move relative to camera
            if (keys['KeyW'] || keys['KeyS']) {
                controls.moveForward(direction.z * speed);
            }
            if (keys['KeyA'] || keys['KeyD']) {
                controls.moveRight(direction.x * speed);
            }

            // Ghost AI
            if (ghost) {
                let dist = ghost.position.distanceTo(camera.position);
                let ghostDir = new THREE.Vector3().subVectors(camera.position, ghost.position);
                ghostDir.y = 0;
                ghostDir.normalize();

                // Ghost moves towards player
                ghost.position.add(ghostDir.multiplyScalar(0.12));
                ghost.lookAt(camera.position.x, 0, camera.position.z);

                if (dist < 1.6) {
                    controls.unlock();
                    alert("PAKAD LIYA!");
                    location.reload();
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
