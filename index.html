<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID AURA</title>

<style>
body,html{margin:0;padding:0;overflow:hidden;background:#000;font-family:sans-serif;}

/* START SCREEN */
#ui{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:#000;z-index:10;color:#fff;
}

#start{
padding:18px 60px;
font-size:20px;
background:#4CAF50;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}
#start:hover{transform:scale(1.05);}

/* GAME OVER */
#gameover{
position:absolute;width:100%;height:100%;
display:none;justify-content:center;align-items:center;flex-direction:column;
background:#000;color:red;z-index:20;
}

</style>
</head>

<body>

<div id="ui">
<h1 style="color:#4CAF50; letter-spacing:6px;">VOID AURA</h1>
<p style="opacity:0.6">Click Play to Start</p>
<button id="start">PLAY GAME</button>
</div>

<div id="gameover">
<h1>MASHED!</h1>
<button onclick="location.reload()">RETRY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>

/* SCENE */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x111111);

/* CAMERA */
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

/* RENDER */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
scene.add(light);

/* PLAYER */
const player=new THREE.Group();
player.position.set(40,1.7,40);
scene.add(player);
player.add(camera);

/* CONTROLS */
const controls=new THREE.PointerLockControls(camera,document.body);

document.getElementById('start').onclick=()=>{
controls.lock();
};

controls.addEventListener('lock',()=>{
document.getElementById('ui').style.display='none';
});

/* GROUND */
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

/* BORDER */
function wall(x,z,w,d){
const m=new THREE.Mesh(
new THREE.BoxGeometry(w,3,d),
new THREE.MeshStandardMaterial({color:0xff0000})
);
m.position.set(x,1.5,z);
scene.add(m);
}

wall(50,-1,100,1);
wall(50,100,100,1);
wall(-1,50,1,100);
wall(100,50,1,100);

/* POTATO AI */
const potato=new THREE.Mesh(
new THREE.SphereGeometry(1.5,32,32),
new THREE.MeshStandardMaterial({color:0x8B4513})
);

potato.position.set(10,2.2,10);
scene.add(potato);

/* INPUT */
let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

let dead=false;

/* LOOP */
function animate(){
requestAnimationFrame(animate);

if(controls.isLocked && !dead){

let speed=keys['ShiftLeft']?0.28:0.14;

let oldX=player.position.x;
let oldZ=player.position.z;

/* MOVE */
if(keys['KeyW']) controls.moveForward(speed);
if(keys['KeyS']) controls.moveForward(-speed);
if(keys['KeyA']) controls.moveRight(-speed);
if(keys['KeyD']) controls.moveRight(speed);

/* BORDER BLOCK */
if(player.position.x<2||player.position.x>98) player.position.x=oldX;
if(player.position.z<2||player.position.z>98) player.position.z=oldZ;

/* 🔥 POTATO CHASE AI (FIXED) */
let dir=new THREE.Vector3().subVectors(player.position,potato.position);
dir.y=0;
dir.normalize();
potato.position.add(dir.multiplyScalar(0.16));

/* FACE PLAYER */
potato.lookAt(player.position.x,1.7,player.position.z);

/* COLLISION (REALISTIC) */
let dx=player.position.x-potato.position.x;
let dz=player.position.z-potato.position.z;
let dist=Math.sqrt(dx*dx+dz*dz);

if(dist<1.3){
dead=true;
controls.unlock();
document.getElementById('gameover').style.display='flex';
}

}

renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
