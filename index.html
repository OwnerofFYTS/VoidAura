<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby | Get Started</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Background setup with dark theme */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
        }

        /* Dark Blur Card (The Lobby) */
        .lobby-card {
            background: rgba(255, 255, 255, 0.05); /* Very slight white for glass effect */
            backdrop-filter: blur(15px); /* This creates the blur */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 80px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Get Started Button */
        .btn-get-started {
            display: inline-block;
            padding: 12px 35px;
            background: #4ecca3; /* Aesthetic Greenish-Teal color */
            color: #1a1a2e;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        .btn-get-started:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.5);
            background: #45b791;
        }
    </style>
</head>
<body>

    <div class="lobby-card">
        <h1>LOBBY</h1>
        <a href="#" class="btn-get-started">Get Started</a>
    </div>

</body>
</html>
