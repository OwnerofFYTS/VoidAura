<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Viper | Game Lobby</title>
    <style>
        /* CSS Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020c1b;
            color: #ccd6f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Lobby Container */
        .lobby-container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Sky Viper Title */
        h1 {
            font-size: clamp(60px, 12vw, 120px);
            font-weight: 800;
            color: #ccd6f6;
            margin: 0;
            letter-spacing: -2px;
            line-height: 1.1;
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
        }

        /* Subtitle */
        .subtitle {
            color: #64ffda;
            font-family: 'Courier New', monospace;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: 6px;
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Get Started Button (VoidCraft Style) */
        .get-started-btn {
            margin-top: 60px;
            padding: 22px 55px;
            background-color: transparent;
            color: #64ffda;
            border: 1px solid #64ffda;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            animation: fadeIn 1.5s ease-out 0.6s both;
        }

        .get-started-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px -10px rgba(100, 255, 218, 0.3);
        }

        /* Decorative Background Elements */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(10, 25, 47, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 25, 47, 0.8) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="lobby-container">
        <p style="color: #64ffda; margin-bottom: 20px; font-family: monospace;">SYSTEM READY_</p>
        <h1>Sky Viper</h1>
        <div class="subtitle">Next-Gen Air Combat</div>
        
        <button class="get-started-btn" onclick="console.log('Game starting...')">
            GET STARTED
        </button>
    </div>

</body>
</html>
