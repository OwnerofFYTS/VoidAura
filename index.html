<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Beyond the Horizon</title>
    <style>
        body { margin: 0; padding: 0; background: #020c1b; color: #e6f1ff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* UI & NAVIGATION */
        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; z-index: 10; position: relative; }
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .get-started { margin-top: 50px; padding: 20px 65px; background: #64ffda; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* GAME VIEW */
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid #64ffda; transform: translate(-50%, -50%); pointer-events: none; z-index: 1010; }

        /* HAND / ITEM IN HAND */
        #hand-container { position: fixed; bottom: 0; right: 10%; width: 200px; height: 200px; z-index: 1005; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        .held-item { width: 100px; height: 100px; transition: transform 0.1s; transform-origin: bottom; }
        .sword-hand { background: #64ffda; clip-path: polygon(40% 0%, 60% 0%, 60% 70%, 100% 70%, 100% 80%, 60% 80%, 60% 100%, 40% 100%, 40% 80%, 0% 80%, 0% 70%, 40% 70%); transform: rotate(25deg); }
        .block-hand { background: #8892b0; border: 4px solid #233554; width: 80px; height: 80px; }

        /* HOTBAR */
        #hotbar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; background: rgba(0,0,0,0.6); padding: 4px; border: 3px solid #1a1a1a; z-index: 1010; }
        .slot { width: 44px; height: 44px; background: #8b8b8b; border: 3px solid #373737; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .slot.selected { border: 3px solid #ffffff; background: #a0a0a0; }
        
        /* INVENTORY SCREEN */
        #inventory-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #c6c6c6; border: 4px solid #333; padding: 20px; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 44px); gap: 2px; margin-bottom: 15px; }
        .inv-label { color: #333; font-size: 14px; font-weight: bold; margin: 5px 0; }

        /* ICONS */
        .icon-sword { width: 20px; height: 20px; background: #64ffda; clip-path: polygon(0% 100%, 100% 0%, 70% 0%, 0% 70%); }
        .icon-block { width: 18px; height: 18px; background: #8892b0; border: 1px solid #233554; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(2,12,27,0.95); }
        .modal-content { background: #112240; width: 300px; margin: 100px auto; padding: 40px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <button class="signup-btn" onclick="openAuth()">Sign Up</button>
    </nav>

    <div class="hero" id="home-hero">
        <h1>VoidCraft</h1>
        <p style="letter-spacing: 4px; color: #8892b0;">BEYOND THE HORIZON</p>
        <button class="get-started" onclick="initGameFlow()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#64ffda">Account</h2>
            <input type="text" id="fname" placeholder="First Name" style="width:100%; margin: 10px 0; padding:10px; background:#0a192f; border:1px solid #233554; color:white;">
            <input type="password" placeholder="Password" style="width:100%; margin: 10px 0; padding:10px; background:#0a192f; border:1px solid #233554; color:white;">
            <button class="get-started" style="width:100%" onclick="launchGame()">Start Playing</button>
        </div>
    </div>

    <div id="game-view">
        <div id="crosshair"></div>
        
        <div id="hand-container">
            <div id="held-item-visual" class="held-item"></div>
        </div>

        <div id="hotbar">
            <div class="slot selected" id="slot-1"><div class="icon-sword"></div></div>
            <div class="slot" id="slot-2"><div class="icon-block"></div></div>
            <div class="slot" id="slot-3"></div>
            <div class="slot" id="slot-4"></div>
            <div class="slot" id="slot-5"></div>
            <div class="slot" id="slot-6"></div>
            <div class="slot" id="slot-7"></div>
            <div class="slot" id="slot-8"></div>
            <div class="slot" id="slot-9"></div>
        </div>

        <div id="inventory-screen">
            <div class="inv-label">Inventory</div>
            <div class="inv-grid">
                <script>for(let i=0; i<27; i++) document.write('<div class="slot"></div>');</script>
            </div>
            <div class="inv-label">Hotbar</div>
            <div class="inv-grid">
                <div class="slot"><div class="icon-sword"></div></div>
                <div class="slot"><div class="icon-block"></div></div>
                <script>for(let i=0; i<7; i++) document.write('<div class="slot"></div>');</script>
            </div>
        </div>
        <canvas id="void-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let loggedIn = false;
        let invOpen = false;
        const canvas = document.getElementById('void-canvas');
        const visualHand = document.getElementById('held-item-visual');

        function openAuth() { document.getElementById('authModal').style.display='block'; }
        function initGameFlow() { if(!loggedIn) openAuth(); else launchGame(); }

        function launchGame() {
            loggedIn = true;
            document.getElementById('authModal').style.display='none';
            document.getElementById('top-nav').style.display='none';
            document.getElementById('home-hero').style.display='none';
            document.getElementById('game-view').style.display='block';
            startVoidEngine();
            updateHand('slot-1');
        }

        function updateHand(slotId) {
            visualHand.className = 'held-item';
            if(slotId === 'slot-1') visualHand.classList.add('sword-hand');
            else if(slotId === 'slot-2') visualHand.classList.add('block-hand');
        }

        function startVoidEngine() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020c1b);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // World
            const lava = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0xff4400}));
            lava.rotation.x = -Math.PI/2; lava.position.y = -30;
            scene.add(lava);

            for(let i=0; i<8; i++) {
                const tower = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 12), new THREE.MeshStandardMaterial({color: 0x444d56}));
                const angle = (i/8)*Math.PI*2;
                tower.position.set(Math.cos(angle)*35, 0, Math.sin(angle)*35);
                scene.add(tower);
            }
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            camera.position.set(35, 3, 35);
            let velocityY = 0, onGround = true;
            let pitch = 0, yaw = 0;
            const keys = {};

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if(e.code === 'KeyE') {
                    invOpen = !invOpen;
                    document.getElementById('inventory-screen').style.display = invOpen ? 'block' : 'none';
                    if(invOpen) document.exitPointerLock(); else canvas.requestPointerLock();
                }
                if(e.key >= 1 && e.key <= 9) {
                    document.querySelectorAll('#hotbar .slot').forEach(s => s.classList.remove('selected'));
                    const selectedSlot = document.getElementById('slot-' + e.key);
                    selectedSlot.classList.add('selected');
                    updateHand('slot-' + e.key);
                }
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            canvas.addEventListener('mousedown', () => { 
                if(!invOpen) {
                    canvas.requestPointerLock();
                    visualHand.style.transform = "translateY(-20px) rotate(10deg)";
                    setTimeout(() => visualHand.style.transform = "translateY(0) rotate(25deg)", 100);
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === canvas) {
                    yaw -= e.movementX * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
                }
            });

            function animate() {
                requestAnimationFrame(animate);
                if (document.pointerLockElement === canvas && !invOpen) {
                    let speed = keys['ControlLeft'] ? 0.3 : (keys['ShiftLeft'] ? 0.07 : 0.18);
                    if(keys['KeyW']) { camera.position.x -= Math.sin(yaw)*speed; camera.position.z -= Math.cos(yaw)*speed; }
                    if(keys['KeyS']) { camera.position.x += Math.sin(yaw)*speed; camera.position.z += Math.cos(yaw)*speed; }
                    if(keys['KeyA']) { camera.position.x -= Math.sin(yaw+1.57)*speed; camera.position.z -= Math.cos(yaw+1.57)*speed; }
                    if(keys['KeyD']) { camera.position.x += Math.sin(yaw+1.57)*speed; camera.position.z += Math.cos(yaw+1.57)*speed; }
                    if(keys['Space'] && onGround) { velocityY = 0.2; onGround = false; }
                }

                velocityY -= 0.01;
                camera.position.y += velocityY;
                let viewHeight = keys['ShiftLeft'] ? 2.2 : 3;
                
                if (camera.position.y <= viewHeight) {
                    camera.position.y = viewHeight;
                    velocityY = 0;
                    onGround = true;
                }

                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                if(camera.position.y < -28) camera.position.set(35, 3, 35);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
