<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const wrapper = document.getElementById('game-wrapper');
    const uiLayer = document.getElementById('ui-layer');
    const playBtn = document.getElementById('play-button');
    const reticle = document.getElementById('reticle');

    // 1. Scene & Camera Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 1, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Player Object (Jo camera ko carry karega)
    const player = new THREE.Group();
    player.position.y = 1.7; // Initial height
    scene.add(player);
    player.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    wrapper.appendChild(renderer.domElement);

    // 2. Lights & Floor
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const grid = new THREE.GridHelper(200, 60, 0xff4444, 0x222222);
    scene.add(grid);

    // Gun
    const gun = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.2, 0.7),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    gun.position.set(0.4, -0.3, -0.6);
    camera.add(gun);

    // Targets
    const targets = [];
    for(let i=0; i<15; i++) {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 3, 1.5),
            new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        mesh.position.set(Math.random() * 80 - 40, 1.5, Math.random() * 80 - 40);
        scene.add(mesh);
        targets.push(mesh);
    }

    // 3. Controls & Inputs
    const controls = new PointerLockControls(camera, document.body);
    playBtn.addEventListener('click', () => controls.lock());

    controls.addEventListener('lock', () => { uiLayer.style.display = 'none'; reticle.style.display = 'block'; });
    controls.addEventListener('unlock', () => { uiLayer.style.display = 'flex'; reticle.style.display = 'none'; });

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let canJump = false, isCrouching = false;
    let velocity = new THREE.Vector3();
    
    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
        if(e.code === 'Space' && canJump) { velocity.y = 8; canJump = false; } // Jump power
        if(e.code === 'ShiftLeft') isCrouching = true;
    });

    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
        if(e.code === 'ShiftLeft') isCrouching = false;
    });

    // 4. Shooting Logic
    window.addEventListener('mousedown', () => {
        if (controls.isLocked) {
            gun.position.z += 0.1;
            setTimeout(() => gun.position.z -= 0.1, 50);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(targets);
            if(hits.length > 0) hits[0].object.position.y = -10;
        }
    });

    // 5. Game Loop (Gravity & Speed Fix)
    let prevTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        if (controls.isLocked) {
            // Speed Adjustments (Normal Speed)
            const speed = 40.0;
            const friction = 8.0;

            velocity.x -= velocity.x * friction * delta;
            velocity.z -= velocity.z * friction * delta;
            velocity.y -= 25.0 * delta; // Gravity

            // Movement direction logic
            if (moveForward) velocity.z -= speed * delta;
            if (moveBackward) velocity.z += speed * delta;
            if (moveLeft) velocity.x -= speed * delta;
            if (moveRight) velocity.x += speed * delta;

            // Apply movement to player object
            controls.moveRight(velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            // Crouch height logic
            let targetHeight = isCrouching ? 0.8 : 1.7;
            player.position.y += (targetHeight - player.position.y) * 0.1; // Smooth crouch transition
            
            // Vertical movement (Jump/Fall)
            player.position.y += velocity.y * delta;

            // Floor collision
            if (player.position.y < targetHeight) {
                velocity.y = 0;
                player.position.y = targetHeight;
                canJump = true;
            }
        }

        prevTime = time;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
