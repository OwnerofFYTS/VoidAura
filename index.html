<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyViper | Gaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #08080a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Navbar for Top Right Buttons */
        .navbar {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            font-size: 14px;
        }

        .login-nav { background: transparent; color: #4facfe; border: 1px solid #4facfe; }
        .signup-nav { background: #4facfe; color: white; }
        .nav-btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* Center Content */
        .main-lobby {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 70px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 8px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Modal / Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid #30363d;
            position: relative;
        }

        .modal-box h2 { margin-bottom: 20px; color: #4facfe; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        input:focus { border-color: #4facfe; }

        /* Error Message Styling */
        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 5px;
            display: none; /* Pehle hide rahega */
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4facfe;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }

        .close-x {
            position: absolute;
            top: 15px; right: 20px;
            color: #888; cursor: pointer; font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn login-nav" onclick="openModal('Login')">Login</button>
        <button class="nav-btn signup-nav" onclick="openModal('Sign Up')">Sign Up</button>
    </div>

    <div class="main-lobby">
        <h1>SKY VIPER</h1>
        <p class="subtitle">All 2D Games In One Website</p>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <span class="close-x" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            
            <form id="authForm">
                <input type="email" id="email" placeholder="Enter Email" required>
                <input type="password" id="password" placeholder="Enter Password" required>
                
                <p id="error-msg">Incorrect email or password!</p>
                
                <button type="submit" class="submit-btn">Continue</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('authModal');
        const modalTitle = document.getElementById('modalTitle');
        const errorMsg = document.getElementById('error-msg');
        const authForm = document.getElementById('authForm');

        function openModal(title) {
            modal.style.display = 'flex';
            modalTitle.innerText = title;
            errorMsg.style.display = 'none'; // Reset error on open
            authForm.reset();
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Real Logic for Incorrect Email/Pass
        authForm.onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Demo Check: Agar admin@gmail.com aur 12345 nahi hai to error dikhao
            if(email === "admin@gmail.com" && pass === "12345") {
                alert("Login Successful! Welcome to SkyViper.");
                closeModal();
            } else {
                errorMsg.style.display = 'block'; // Show error
                // Input shake effect (optional)
                authForm.style.animation = "shake 0.2s ease-in-out 0s 2";
            }
        };

        // Modal band karne ke liye bahar click karein
        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
