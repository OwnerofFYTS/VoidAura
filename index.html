<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA - VISIBILITY FIX</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 20; }
        #start { padding: 15px 40px; font-size: 22px; background: #900; color: white; border: none; cursor: pointer; font-weight: bold; }
        #stamina-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 8px; background: #222; border: 1px solid #444; }
        #fill { height: 100%; width: 100%; background: #f00; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color: #f00; letter-spacing: 5px;">VOID AURA</h1>
    <button id="start">START GAME</button>
</div>

<div id="stamina-bar"><div id="fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    // Fog ko thoda kam kiya taaki door tak nazar aaye
    scene.fog = new THREE.FogExp2(0x020202, 0.04); 

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Lights ko barha diya taaki model dikhe
    const ambient = new THREE.AmbientLight(0xffffff, 1.5); 
    scene.add(ambient);
    
    // Player ki flashlight jo Ghost ko highlight karegi
    const spotLight = new THREE.SpotLight(0xffffff, 2);
    spotLight.angle = Math.PI / 6;
    spotLight.penumbra = 0.5;
    scene.add(spotLight);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => controls.lock();
    controls.addEventListener('lock', () => document.getElementById('ui').style.display = 'none');

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        ghost.position.set(15, 0, 15); // Player ke thoda kareeb rakha
        scene.add(ghost);
        
        // Ghost ko glow dene ke liye (Self-illumination)
        ghost.traverse((child) => {
            if (child.isMesh) {
                child.material.emissive = new THREE.Color(0x220000); // Halki red chamak
            }
        });

        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
    });

    const keys = {};
    document.onkeydown = (e) => keys[e.code] = true;
    document.onkeyup = (e) => keys[e.code] = false;

    let stamina = 100;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            // Player Speed Kam Kar Di (Slow Movement)
            let isSprinting = keys['ShiftLeft'] && stamina > 0;
            let speed = isSprinting ? 0.22 : 0.12; 
            
            if (isSprinting) stamina -= 0.5;
            else stamina += 0.2;
            stamina = Math.min(100, Math.max(0, stamina));
            document.getElementById('fill').style.width = stamina + "%";

            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            // Light follow player
            spotLight.position.copy(camera.position);
            spotLight.target.position.set(
                camera.position.x + camera.getWorldDirection(new THREE.Vector3()).x,
                camera.position.y + camera.getWorldDirection(new THREE.Vector3()).y,
                camera.position.z + camera.getWorldDirection(new THREE.Vector3()).z
            );
            spotLight.target.updateMatrixWorld();

            // Ghost AI
            if (ghost) {
                let dist = ghost.position.distanceTo(camera.position);
                let ghostDir = new THREE.Vector3().subVectors(camera.position, ghost.position);
                ghostDir.y = 0; ghostDir.normalize();

                // Ghost thoda tez kiya taaki hamesha peeche rahe
                ghost.position.add(ghostDir.multiplyScalar(0.08)); 
                ghost.lookAt(camera.position.x, 0, camera.position.z);

                if (dist < 1.5) {
                    controls.unlock();
                    alert("GHOST CAUGHT YOU!");
                    location.reload();
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
