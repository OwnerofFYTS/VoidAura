<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Viper | Pro Edition</title>
    <style>
        /* CSS RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020c1b; /* Deep Navy Blue */
            color: #ccd6f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TOP NAVIGATION */
        nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 30px 50px;
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #ccd6f6;
            text-decoration: none;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
            cursor: default; /* Non-clickable feel */
        }

        .signup-btn {
            background: transparent;
            color: #64ffda; /* Teal Color */
            border: 1px solid #64ffda;
            padding: 10px 22px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* MAIN HERO SECTION */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px;
        }

        .prefix {
            color: #64ffda;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        h1 {
            font-size: clamp(60px, 10vw, 100px);
            font-weight: 800;
            color: #ccd6f6;
            margin: 0;
            letter-spacing: -2px;
        }

        .tagline {
            color: #8892b0;
            font-size: clamp(18px, 3vw, 24px);
            margin-top: 10px;
            max-width: 600px;
            line-height: 1.3;
        }

        /* GET STARTED BUTTON */
        .get-started-btn {
            margin-top: 60px;
            padding: 20px 60px;
            background-color: #64ffda;
            color: #020c1b;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .get-started-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(100, 255, 218, 0.5);
        }

        /* DECORATIVE GRID (Lobby Vibe) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#112240 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <nav>
        <div class="nav-links">
            <a href="#">About</a>
            <a href="#">Mission</a>
            <a href="#">Leaderboard</a>
            <button class="signup-btn">Sign Up</button>
        </div>
    </nav>

    <main class="hero">
        <p class="prefix">Project Alpha Presents</p>
        <h1>Sky Viper</h1>
        <p class="tagline">Next-generation aerial combat. Command the skies with precision and power.</p>
        
        <button class="get-started-btn">
            GET STARTED
        </button>
    </main>

</body>
</html>
